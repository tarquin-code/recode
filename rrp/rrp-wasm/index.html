<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recode Remote GPU Server</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
canvas { width: 100% !important; height: 100% !important; }
.loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #58a6ff; font-family: -apple-system, sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading Recode Remote...</div>
<canvas id="recode_gui_canvas"></canvas>
<script type="module">
import init, { start_app } from './rrp_gui.js';
async function run() {
    await init();
    document.getElementById('loading').remove();
    start_app();
}
run();
</script>
</body>
</html>
